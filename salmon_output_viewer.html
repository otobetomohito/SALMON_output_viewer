      document.getElementById('ingestSummary').textContent = skippedTotal
        ? `${groups.length} cube sequence group(s) loaded from directory. Skipped ${skippedTotal} file(s).`
        : `${groups.length} cube sequence group(s) loaded from directory.`;
      updateControls();
      renderDatasetList();
      renderViewer(state);
    }

    async function loadMapDirectoryFiles(files) {
      const dataFiles = files.filter((file) => /_(xy|yz|zx)_\d+\.data$/i.test(String(file.name || '')));
      const ignoredCount = files.length - dataFiles.length;
      const groups = groupSequentialFiles(dataFiles);
      const parsed = [];
      const skipped = [];
      document.getElementById('ingestSummary').textContent = `Scanning ${dataFiles.length} map file(s)...`;
      for (const group of groups) {
        const groupFrames = [];
        for (let index = 0; index < group.files.length; index += 1) {
          const file = group.files[index];
          try {
            const text = await readFileText(file);
            const dataset = parseFileByKind(file, text, 'directory', group.sequenceId || `${group.prefix}${group.extension}`, index);
            if (dataset.kind === 'xy_map_frame' && group.files.length > 1) {
              groupFrames.push(dataset);
            } else if (dataset.kind === 'xy_map_frame') {
              parsed.push(dataset);
            } else {
              skipped.push(`${file.name}: unsupported map file`);
            }
          } catch (error) {
            skipped.push(`${file.name}: ${error.message}`);
          }
        }
        if (groupFrames.length) {
          parsed.push(buildXyMapSequenceDataset(
            groupFrames,
            group.sequenceId || `${group.prefix}${group.extension}`,
            group.seriesLabel || group.prefix
          ));
        }
      }
      const previousActive = getActiveDataset();
      const replacedKeys = new Set(parsed.map((dataset) => getDatasetSourceKey(dataset)));
      state.datasets = [
        ...state.datasets.filter((dataset) => {
          if (dataset.source?.mode !== 'directory') return true;
          return !replacedKeys.has(getDatasetSourceKey(dataset));
        }),
        ...parsed
      ];
      if (previousActive && previousActive.source?.mode === 'directory' && replacedKeys.has(getDatasetSourceKey(previousActive))) {
        state.viewer.active_dataset_id = '';
        state.viewer.active_series = [];
        state.viewer.active_field = '';
        state.viewer.frame_index = 0;
      }
      state.metadata.source_directories.push('map-directory-upload');
      const skippedTotal = skipped.length + ignoredCount;
      document.getElementById('ingestSummary').textContent = skippedTotal
        ? `${groups.length} map sequence group(s) loaded from directory. Skipped ${skippedTotal} file(s).`
        : `${groups.length} map sequence group(s) loaded from directory.`;
      updateControls();
      renderDatasetList();
      renderViewer(state);
    }

    async function loadDirectoryFiles(files) {
      return loadCubeDirectoryFiles(files);
    }

    function exportActiveDatasetAsCsv() {
      const dataset = getActiveDataset();
      if (!dataset || !dataset.series.length) return '';
      const selectedSeries = dataset.series.filter((entry) => state.viewer.active_series.includes(entry.name));
      const series = selectedSeries.length ? selectedSeries : dataset.series.slice(0, 1);
      const headers = ['x', ...series.map((entry) => entry.name)];
      const rows = series[0].values.map((point, rowIndex) => [point[0], ...series.map((entry) => entry.values[rowIndex][1])]);
      return [headers.join(','), ...rows.map((row) => row.join(','))].join('\n');
    }

    function exportCurrentPlotAsPng() {
      return true;
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('selectFilesButton').addEventListener('click', () => document.getElementById('fileInput').click());
      document.getElementById('selectMapDirectoryButton').addEventListener('click', () => document.getElementById('mapDirectoryInput').click());
      document.getElementById('selectDirectoryButton').addEventListener('click', () => document.getElementById('directoryInput').click());
      document.getElementById('fileInput').addEventListener('change', async (event) => {
        const files = [...event.target.files];
        try {
          if (files.length) {
            await loadSelectedFiles(files, 'file');
          } else {
            document.getElementById('ingestSummary').textContent = 'No files selected.';
          }
        } catch (error) {
          document.getElementById('ingestSummary').textContent = `File load failed: ${error.message}`;
        }
        event.target.value = '';
      });
      document.getElementById('directoryInput').addEventListener('change', async (event) => {
        const files = [...event.target.files];
        try {
          if (files.length) {
            await loadCubeDirectoryFiles(files);
          } else {
            document.getElementById('ingestSummary').textContent = 'No directory items selected.';
          }
        } catch (error) {
          document.getElementById('ingestSummary').textContent = `Directory load failed: ${error.message}`;
        }
        event.target.value = '';
      });
      document.getElementById('mapDirectoryInput').addEventListener('change', async (event) => {
        const files = [...event.target.files];
        try {
          if (files.length) {
            await loadMapDirectoryFiles(files);
          } else {
            document.getElementById('ingestSummary').textContent = 'No map directory items selected.';
          }
        } catch (error) {
          document.getElementById('ingestSummary').textContent = `Map directory load failed: ${error.message}`;
        }
        event.target.value = '';
      });
      document.getElementById('seriesSelect').addEventListener('change', (event) => {
        const selectedValues = Array.from(event.target.selectedOptions || []).map((option) => option.value);
        state.viewer.active_series = selectedValues.length ? selectedValues : [];
        const activeSlot = getActiveLineSlot();
        if (activeSlot) {
          activeSlot.active_series = [...state.viewer.active_series];
        }
        renderViewer(state);
      });
      document.getElementById('yScaleSelect').addEventListener('change', (event) => {
        state.viewer.y_scale = event.target.value;
        const activeSlot = getActiveLineSlot();
        if (activeSlot) {
          activeSlot.y_scale = event.target.value;
        }
        renderViewer(state);
      });
      document.getElementById('fieldSelect').addEventListener('change', (event) => {
        state.viewer.active_field = event.target.value;
        renderViewer(state);
      });
      document.getElementById('rangeModeSelect').addEventListener('change', (event) => {
        state.viewer.heatmap_range_mode = event.target.value;
        renderViewer(state);
      });
      document.getElementById('slicePlane').addEventListener('change', (event) => {
        state.viewer.slice_plane = event.target.value;
        updateControls();
        renderViewer(state);
      });
      document.getElementById('sliceIndex').addEventListener('input', (event) => {
        state.viewer.slice_index = Number(event.target.value);
        document.getElementById('sliceIndexLabel').textContent = event.target.value;
        renderViewer(state);
      });
      document.getElementById('thresholdSlider').addEventListener('input', (event) => {
        state.viewer.threshold_ratio = Number(event.target.value) / 100;
        updateControls();
        renderViewer(state);
      });
      document.getElementById('isoValueSlider').addEventListener('input', (event) => {
        state.viewer.iso_ratio = Number(event.target.value) / 100;
        updateControls();
        renderViewer(state);
      });
      document.getElementById('opacitySlider').addEventListener('input', (event) => {
        state.viewer.iso_opacity = Number(event.target.value) / 100;
        updateControls();
        renderViewer(state);
      });
      document.getElementById('pointSizeSlider').addEventListener('input', (event) => {
        state.viewer.point_size = Number(event.target.value);
        updateControls();
        renderViewer(state);
      });
      document.getElementById('resetViewButton').addEventListener('click', () => {
        resetFieldView();
      });
      document.getElementById('frameSlider').addEventListener('input', (event) => {
        state.viewer.frame_index = Number(event.target.value);
        updateControls();
        renderViewer(state);
      });
      document.getElementById('prevFrameButton').addEventListener('click', () => stepAnimation(-1));
      document.getElementById('nextFrameButton').addEventListener('click', () => stepAnimation(1));
      document.getElementById('playButton').addEventListener('click', () => playAnimation());
      document.getElementById('pauseButton').addEventListener('click', () => pauseAnimation());
      document.getElementById('recordButton').addEventListener('click', () => {
        recordAnimation();
      });
      document.getElementById('exportCsvButton').addEventListener('click', () => {
        exportActiveDatasetAsCsv();
      });
      document.getElementById('exportPngButton').addEventListener('click', () => {
        exportCurrentPlotAsPng();
      });
      const fieldCanvas = document.getElementById('field3dCanvas');
      let dragState = null;
      fieldCanvas.addEventListener('pointerdown', (event) => {
        dragState = {
          x: event.clientX,
          y: event.clientY,
          shiftKey: event.shiftKey
        };
        fieldCanvas.setPointerCapture?.(event.pointerId);
      });
      fieldCanvas.addEventListener('pointermove', (event) => {
        if (!dragState) return;
        const dx = event.clientX - dragState.x;
        const dy = event.clientY - dragState.y;
        dragState.x = event.clientX;
        dragState.y = event.clientY;
        dragState.shiftKey = event.shiftKey;
        if (event.shiftKey || dragState.shiftKey) {
          state.viewer.pan_x += dx;
          state.viewer.pan_y += dy;
        } else {
          state.viewer.rotation_y += dx * 0.01;
          state.viewer.rotation_x += dy * 0.01;
        }
        renderViewer(state);
      });
      fieldCanvas.addEventListener('pointerup', (event) => {
        dragState = null;
        fieldCanvas.releasePointerCapture?.(event.pointerId);
      });
      fieldCanvas.addEventListener('pointerleave', () => {
        dragState = null;
      });
      fieldCanvas.addEventListener('wheel', (event) => {
        event.preventDefault();
        const factor = event.deltaY < 0 ? 1.1 : 0.9;
        state.viewer.zoom_3d = Math.min(6, Math.max(0.2, state.viewer.zoom_3d * factor));
        renderViewer(state);
      }, { passive: false });
      updateControls();
      renderDatasetList();
      renderViewer(state);
    });
  </script>
